name: Astronomer CI - Deploy dbt code

on:
  push:
    branches:
      - main # Define a branch para a qual o workflow será acionado

env:
  ## Sets Deployment API credentials as environment variables
  ASTRO_API_TOKEN: ${{ secrets.ASTRO_API_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to Astro
      uses: astronomer/deploy-action@v0.10.1
      with:
            deployment-id: ${{ secrets.ASTRO_DEPLOYMENT_ID }}
            deploy-type: dbt
            root-folder: wks_dbt #pasta do projeto dbt dentro do repositório, onde está o dbt_project.yml